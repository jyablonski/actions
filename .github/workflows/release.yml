name: Release Go Actions Image

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/jyablonski/actions-go
  GO_VERSION: "1.26.5"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - id: version
        run: |
          version="${GITHUB_REF_NAME}"
          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "major=${version%%.*}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: GO_VERSION=${{ env.GO_VERSION }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Report immutable image reference
        run: echo "${IMAGE_NAME}@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack
        uses: ./deploy-notification
        with:
          slack-webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          template: deployment-success
