name: PR Notification
description: Send a Slack notification when a pull request is opened.
inputs:
  slack-webhook:
    description: Slack incoming webhook URL.
    required: true
  slack-mention:
    description: "Optional Slack user ID (for example, <@U01234567>) or user group ID (for example, <!subteam^S01234567>) to ping."
    required: false
    default: ""
runs:
  using: docker
  image: docker://ghcr.io/jyablonski/actions-go@sha256:7d359833218bf7e62524d12fe80f792f4b30b8aa60674e79d95f1c4faf1238f1
  args:
    - --template
    - pr-opened
    - --slack-webhook
    - ${{ inputs.slack-webhook }}
    - --mention
    - ${{ inputs.slack-mention }}
