repos:
  - repo: local
    hooks:
      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false
        always_run: true

      - id: gotestsum
        name: gotestsum with coverage
        entry: scripts/check-go-coverage.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: deadcode
        name: deadcode
        entry: scripts/check-deadcode.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: golangci-lint
        name: golangci-lint
        entry: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run
        language: system
        pass_filenames: false
        always_run: true
