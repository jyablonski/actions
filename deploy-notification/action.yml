name: Deploy Notification
description: Send a Slack pipeline-failure or deployment-success notification.
inputs:
  slack-webhook:
    description: Slack incoming webhook URL.
    required: true
  template:
    description: "Notification template: pipeline-failure or deployment-success."
    required: true
  failed-jobs:
    description: Comma-separated failed job names for pipeline-failure.
    required: false
    default: ""
  deployment-url:
    description: Deployment URL for deployment-success.
    required: false
    default: ""
  slack-mention:
    description: "Optional Slack user ID (for example, <@U01234567>) or user group ID (for example, <!subteam^S01234567>) to ping."
    required: false
    default: ""
  summary:
    description: Optional failure summary.
    required: false
    default: ""
runs:
  using: docker
  # TODO: Replace with the immutable digest emitted by the first GHCR image release.
  image: docker://ghcr.io/jyablonski/actions-go@sha256:<PLACEHOLDER_DIGEST>
  args:
    - --template
    - ${{ inputs.template }}
    - --slack-webhook
    - ${{ inputs.slack-webhook }}
    - --failed-jobs
    - ${{ inputs.failed-jobs }}
    - --deployment-url
    - ${{ inputs.deployment-url }}
    - --mention
    - ${{ inputs.slack-mention }}
    - --summary
    - ${{ inputs.summary }}
