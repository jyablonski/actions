name: Deployment notifications

on:
  # TODO: Change this trigger to match the branch and event that start your deployment.
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # TODO: Replace with the checks that must pass before deployment.
      - run: make test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
    steps:
      - uses: actions/checkout@v7
      - id: release
        run: |
          # TODO: Replace with your deployment command and set released=false when it makes no release.
          make deploy
          echo "released=true" >> "$GITHUB_OUTPUT"

  notify:
    needs: [test, deploy]
    # TODO: Remove the success clause to send notifications only when a job fails.
    if: ${{ always() && (needs.test.result == 'failure' || needs.deploy.result == 'failure' || needs.deploy.outputs.released == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: jyablonski/actions/deploy-notification@v1
        with:
          # TODO: Create this repository secret with the Slack incoming webhook URL.
          slack-webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          template: ${{ (needs.test.result == 'failure' || needs.deploy.result == 'failure') && 'pipeline-failure' || 'deployment-success' }}
          slack-mention: "<@U02NA9HHPCH>"
