name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # TODO: Replace with your CI checks.
      - run: echo "ci..."

  quality:
    runs-on: ubuntu-latest
    steps:
      # TODO: Replace with your quality checks.
      - run: echo "quality..."

  deploy:
    needs: [ci, quality]
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      # TODO: Replace with your deployment command.
      - run: echo "deploying..."

  notify:
    needs: [ci, quality, deploy]
    # TODO: Remove the deployment-success clause to send notifications only when a job fails.
    if: ${{ always() && (contains(needs.*.result, 'failure') || needs.deploy.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: jyablonski/actions/deploy-notification@v1
        with:
          # TODO: Create this repository secret with the Slack incoming webhook URL.
          slack-webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          template: ${{ contains(needs.*.result, 'failure') && 'pipeline-failure' || 'deployment-success' }}
          slack-mention: "<@U02NA9HHPCH>"
